name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases
  id-token: write   # needed for PyPI trusted publishing

jobs:
  build-and-publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatch

      - name: Sync version from tag
        # Sets project.version in pyproject.toml to match the pushed tag (strips leading 'v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$TAG\"/" pyproject.toml
          echo "Building version $TAG"

      - name: Run tests before publishing
        run: |
          pip install -e ".[dev]"
          pytest -v --tb=short

      - name: Build wheel + sdist
        run: hatch build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No PYPI_API_TOKEN needed — uses OIDC trusted publishing.
        # One-time setup: go to pypi.org → project → Publishing → add GitHub trusted publisher.
